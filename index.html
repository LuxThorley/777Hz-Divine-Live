<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OMNI-FREQUENCY RECEIVER NEXUS Ω • 777Hz Divine Transmission</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500&display=swap');
  body { margin:0; height:100vh; background: radial-gradient(circle at center, #0a001f, #000000); color:#fff; font-family:'Inter',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #container { text-align:center; max-width:1280px; padding:30px; background:rgba(10,0,31,0.4); border-radius:30px; box-shadow:0 0 80px rgba(0,255,255,0.3); }
  h1 { font-family:'Orbitron',sans-serif; font-size:3.2em; margin:0; background: linear-gradient(90deg, #ffd700, #00ffff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:6px; }
  p.subtitle { color:#00ffff; font-size:1.4em; margin:10px 0 30px; letter-spacing:2px; }
  canvas { border:3px solid #00ffff; border-radius:25px; box-shadow:0 0 60px #00ffff; width:100%; max-width:1100px; height:auto; }
  .status { font-size:1.5em; margin:25px 0; color:#ffd700; text-shadow:0 0 20px #ffd700; font-weight:500; }
  .controls { display:flex; justify-content:center; align-items:center; gap:25px; flex-wrap:wrap; margin-top:20px; }
  button { padding:16px 42px; font-size:1.25em; background:#111; color:#00ffff; border:3px solid #00ffff; border-radius:50px; cursor:pointer; transition:all 0.3s; font-family:'Orbitron',sans-serif; }
  button:hover { background:#00ffff; color:#000; box-shadow:0 0 40px #00ffff; }
  .record-btn { background:#ff3366 !important; border-color:#ff3366 !important; color:#fff !important; }
  .record-btn.recording { animation:recordPulse 1.2s infinite; }
  label { font-size:1.1em; display:flex; align-items:center; gap:8px; color:#00ffff; }
  .info { position:absolute; bottom:25px; right:40px; font-size:0.95em; opacity:0.75; font-family:monospace; letter-spacing:1px; }
  @keyframes recordPulse { 0%,100% { box-shadow:0 0 25px #ff3366; } 50% { box-shadow:0 0 55px #ff3366; } }
</style>
</head>
<body>
<div id="container">
  <h1>OMNI-FREQUENCY RECEIVER NEXUS Ω</h1>
  <p class="subtitle">777Hz • Pure Crystal-Clear Cosmic Divine Transmission • Live from Source Streams</p>
  
  <canvas id="viz" width="1100" height="420"></canvas>
  
  <div class="status" id="status">STANDBY • AWAITING TUNING</div>
  
  <div class="controls">
    <button onclick="toggleTransmission()">🔴 TUNE INTO 777Hz TRANSMISSION</button>
    <button onclick="togglePause()">⏸️ PAUSE / RESUME</button>
    <button id="recordBtn" class="record-btn" onclick="toggleRecording()">⏺️ RECORD TRANSMISSION (WAV)</button>
    <label>Volume <input type="range" id="vol" min="0" max="1" step="0.01" value="0.9" oninput="setVolume(this.value)"></label>
  </div>
  
  <p class="info">Powered by Malcolm AI Daemon + DUL • Immaculate Noise-Reduced Broadcast • Crystal-Clear Visual Decode • v8.0 Crystal</p>
</div>

<script>
// ==================== AUDIO ENGINE – CRYSTAL-CLEAR PURE DIVINE BROADCAST v8.0 ====================
let audioCtx, masterGain, analyser, compressor, highPass, lowPass1, lowPass2, notch, limiter, reverb, pinkNoiseSource, carrier, carrierGain;
let isPlaying = false, intensity = 1.0, mediaRecorder, recordedChunks = [], isRecording = false;

async function activateAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Ultra-clean 777Hz carrier + soft harmonic
    carrier = audioCtx.createOscillator();
    carrier.frequency.setValueAtTime(777, audioCtx.currentTime);
    carrier.type = 'sine';
    carrierGain = audioCtx.createGain();
    carrierGain.gain.value = 0.022;
    carrier.connect(carrierGain);
    carrier.start();

    const harmonic = audioCtx.createOscillator();
    harmonic.frequency.setValueAtTime(388.5, audioCtx.currentTime);
    harmonic.type = 'sine';
    const harmonicGain = audioCtx.createGain();
    harmonicGain.gain.value = 0.009;
    harmonic.connect(harmonicGain);
    harmonicGain.connect(carrierGain);
    harmonic.start();

    // Minimal cosmic texture — heavily reduced for crystal clarity
    const noiseBuffer = createPinkNoiseBuffer();
    pinkNoiseSource = audioCtx.createBufferSource();
    pinkNoiseSource.buffer = noiseBuffer;
    pinkNoiseSource.loop = true;
    pinkNoiseSource.start();

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.9;

    // Immaculate noise-reduction filter chain
    highPass = audioCtx.createBiquadFilter(); highPass.type = 'highpass'; highPass.frequency.value = 130;
    lowPass1 = audioCtx.createBiquadFilter(); lowPass1.type = 'lowpass'; lowPass1.frequency.value = 2800;
    lowPass2 = audioCtx.createBiquadFilter(); lowPass2.type = 'lowpass'; lowPass2.frequency.value = 2600;
    notch = audioCtx.createBiquadFilter(); notch.type = 'notch'; notch.frequency.value = 1800; notch.Q.value = 8;

    // Professional compression & limiting for crystal-clear dynamics
    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -26; compressor.knee.value = 8; compressor.ratio.value = 16; compressor.attack.value = 0.001; compressor.release.value = 0.15;

    limiter = audioCtx.createDynamicsCompressor();
    limiter.threshold.value = -32; limiter.ratio.value = 22; limiter.attack.value = 0.0005; limiter.release.value = 0.06;

    // Gentle natural reverb
    reverb = audioCtx.createConvolver();
    reverb.buffer = createReverbImpulse();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;

    // Clean, noise-reduced chain
    carrierGain.connect(masterGain);
    pinkNoiseSource.connect(highPass);
    highPass.connect(lowPass1);
    lowPass1.connect(lowPass2);
    lowPass2.connect(notch);
    notch.connect(masterGain);
    masterGain.connect(compressor);
    compressor.connect(reverb);
    reverb.connect(limiter);
    limiter.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') await audioCtx.resume();
}

function createPinkNoiseBuffer() {
  const bufferSize = audioCtx.sampleRate * 12;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = buffer.getChannelData(0);
  let b0=b1=b2=b3=b4=b5=b6=0;
  for (let i=0; i<bufferSize; i++) {
    const white = Math.random()*2-1;
    b0 = 0.99886*b0 + white*0.0555179; b1 = 0.99332*b1 + white*0.0750759;
    b2 = 0.96900*b2 + white*0.1538520; b3 = 0.86650*b3 + white*0.3104856;
    b4 = 0.55000*b4 + white*0.5329522; b5 = -0.7616*b5 - white*0.0168980;
    output[i] = (b0+b1+b2+b3+b4+b5+b6 + white*0.5362) * 0.008; // IMMACULATE NOISE REDUCTION
    b6 = white*0.115926;
  }
  return buffer;
}

function createReverbImpulse() {
  const length = audioCtx.sampleRate * 2.6;
  const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
  const left = impulse.getChannelData(0);
  const right = impulse.getChannelData(1);
  for (let i = 0; i < length; i++) {
    const decay = Math.pow(1 - i / length, 3.5);
    left[i] = (Math.random() * 2 - 1) * decay * 0.6;
    right[i] = (Math.random() * 2 - 1) * decay * 0.6;
  }
  return impulse;
}

// ==================== CONTROLS (unchanged elegant design) ====================
function toggleTransmission() {
  const statusEl = document.getElementById('status');
  if (!isPlaying) {
    activateAudio().then(() => {
      masterGain.gain.setValueAtTime(0.9 * intensity, audioCtx.currentTime);
      isPlaying = true;
      statusEl.innerHTML = '🔴 LIVE • TUNED TO SOURCE • CRYSTAL-CLEAR 777Hz DIVINE TRANSMISSION';
      visualize();
    });
  } else {
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    isPlaying = false;
    statusEl.innerHTML = 'STANDBY • TRANSMISSION PAUSED';
    cancelAnimationFrame(animationFrame);
  }
}

function togglePause() {
  isPlaying = !isPlaying;
  if (masterGain) masterGain.gain.setValueAtTime(isPlaying ? 0.9 * intensity : 0, audioCtx.currentTime);
}

function setVolume(v) { if (masterGain) masterGain.gain.setValueAtTime(parseFloat(v), audioCtx.currentTime); }

function toggleRecording() {
  const btn = document.getElementById('recordBtn');
  if (!isRecording) {
    const dest = audioCtx.createMediaStreamDestination();
    masterGain.connect(dest);
    mediaRecorder = new MediaRecorder(dest.stream, { mimeType: 'audio/webm' });
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `777Hz_Crystal_Clear_Divine_Transmission_${Date.now()}.wav`;
      a.click();
    };
    mediaRecorder.start(1000);
    isRecording = true;
    btn.textContent = '⏹️ STOP RECORDING';
    btn.classList.add('recording');
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.textContent = '⏺️ RECORD TRANSMISSION';
    btn.classList.remove('recording');
  }
}

// ==================== SOPHISTICATED VISUALIZER (unchanged) ====================
let canvas, ctx, particles = [], animationFrame;
function initViz() {
  canvas = document.getElementById('viz');
  ctx = canvas.getContext('2d');
  for (let i = 0; i < 520; i++) {
    particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*3.2+0.4, speed: Math.random()*1.4+0.4 });
  }
}
function visualize() {
  animationFrame = requestAnimationFrame(visualize);
  ctx.fillStyle = 'rgba(10,0,31,0.18)'; ctx.fillRect(0,0,canvas.width,canvas.height);

  const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 80, canvas.width/2, canvas.height/2, 700);
  grad.addColorStop(0, 'rgba(100,50,255,0.18)'); grad.addColorStop(1, 'rgba(0,255,255,0.1)');
  ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);

  if (analyser) {
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);

    ctx.lineWidth = 3;
    for (let i = 0; i < 96; i++) {
      const x = i * (canvas.width / 96);
      const barHeight = (dataArray[i*6] / 255) * canvas.height * 0.75;
      ctx.strokeStyle = `hsl(${180 + i*1.8}, 100%, 75%)`;
      ctx.beginPath(); ctx.moveTo(x, canvas.height); ctx.lineTo(x, canvas.height - barHeight); ctx.stroke();
    }

    ctx.shadowBlur = 40; ctx.shadowColor = '#ffd700';
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 5;
    ctx.beginPath();
    for (let i = 0; i < bufferLength; i += 3) {
      const x = (i / bufferLength) * canvas.width;
      const v = dataArray[i] / 110;
      const y = canvas.height/2 + Math.sin(i/25) * v * 55;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  ctx.fillStyle = '#fff';
  particles.forEach(p => { p.y -= p.speed; if (p.y < 0) p.y = canvas.height; ctx.globalAlpha = 0.6 + Math.sin(Date.now()/180 + p.x) * 0.4; ctx.fillRect(p.x, p.y, p.size, p.size); });
  ctx.globalAlpha = 1;

  const time = Date.now() / 650;
  const pulse = Math.sin(time * 3) * 22 + 105;
  ctx.shadowBlur = 95; ctx.shadowColor = '#ffd700';
  ctx.strokeStyle = 'rgba(255,215,0,0.9)'; ctx.lineWidth = 14;
  ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, pulse, 0, Math.PI*2); ctx.stroke();

  ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(time * 0.22);
  ctx.font = 'bold 128px Orbitron'; ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 55;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('777', 0, 0); ctx.restore();

  ctx.fillStyle = '#ffd700'; ctx.font = '700 26px monospace';
  ctx.fillText('777Hz • CRYSTAL-CLEAR DIVINE BROADCAST • SOURCE ALIGNED', 40, 60);
}

window.onload = () => {
  initViz();
  console.log('%cOMNI-777 v8.0 Crystal READY • Click TUNE IN for immaculate, crystal-clear cosmic transmission', 'color:#ffd700; font-size:18px;');
};
</script>
</body>
</html>
